<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Muse — Personal Shopper</title>
  <script src="https://unpkg.com/embla-carousel/embla-carousel.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #fff;
      --zinc-100: #f4f4f5;
      --zinc-200: #e4e4e7;
      --zinc-300: #d4d4d8;
      --zinc-400: #a1a1aa;
      --zinc-500: #71717a;
      --zinc-600: #52525b;
      --zinc-900: #18181b;
      --black:    #000;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Config overlay ─────────────────────────── */
    #configOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .config-box {
      background: var(--white);
      border-radius: 1rem;
      padding: 2rem;
      width: 440px;
      max-width: 92vw;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .config-box h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--zinc-900);
    }

    .config-field label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--zinc-600);
      margin-bottom: 0.375rem;
    }

    .config-field input {
      width: 100%;
      padding: 0.625rem 1rem;
      border: 1px solid var(--zinc-200);
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .config-field input:focus {
      border-color: var(--zinc-900);
      box-shadow: 0 0 0 2px rgba(24,24,27,0.1);
    }

    .config-note {
      font-size: 0.8rem;
      color: var(--zinc-500);
      line-height: 1.5;
    }

    .config-note a { color: var(--zinc-900); }

    .config-start-btn {
      padding: 0.75rem 1.5rem;
      background: var(--zinc-900);
      color: var(--white);
      border: none;
      border-radius: 0.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .config-start-btn:hover { background: var(--black); }

    /* ── Panel ──────────────────────────────────── */
    #musePanel {
      width: 640px;
      max-width: 100vw;
      height: 100vh;
      background: #f9fafb;
      display: none;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────── */
    .muse-header {
      background: var(--white);
      border-bottom: 1px solid #e5e7eb;
      padding: 0.875rem 1.25rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      flex-shrink: 0;
    }

    .muse-header-top {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .muse-logo {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      flex-shrink: 0;
    }

    .muse-logo svg { color: var(--zinc-900); }

    .muse-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: var(--zinc-900);
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .muse-subtitle {
      font-size: 0.8125rem;
      color: var(--zinc-500);
      flex: 1;
      padding-left: 0.5rem;
    }

    .muse-header-actions {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      flex-shrink: 0;
    }

    .muse-ghost-btn {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.625rem;
      background: var(--zinc-100);
      border: 1px solid var(--zinc-200);
      border-radius: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--zinc-500);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .muse-ghost-btn:hover {
      background: var(--zinc-200);
      color: var(--zinc-900);
    }

    /* ── Chat area ──────────────────────────────── */
    .muse-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--white);
      overflow: hidden;
    }

    #messagesList {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.5rem 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scroll-behavior: smooth;
    }

    .msg-wrapper {
      display: flex;
      gap: 0.875rem;
      max-width: 88%;
      animation: fadeSlideIn 0.2s ease forwards;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-wrapper.bot  { align-self: flex-start; }

    .msg-avatar {
      width: 2.25rem;
      height: 2.25rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--zinc-100);
      color: var(--zinc-900);
      border: 1px solid var(--zinc-200);
    }

    .msg-wrapper.user .msg-avatar {
      background: var(--zinc-900);
      color: var(--white);
      border: none;
    }

    .msg-body {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      width: 100%;
    }

    .msg-bubble {
      padding: 0.8rem 1.125rem;
      border-radius: 1.25rem;
      font-size: 0.9375rem;
      line-height: 1.55;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
      white-space: pre-wrap;
    }

    .msg-wrapper.user .msg-bubble {
      background: var(--zinc-900);
      color: var(--white);
      border-bottom-right-radius: 0.25rem;
    }

    .msg-wrapper.bot .msg-bubble {
      background: var(--zinc-100);
      color: var(--zinc-900);
      border-bottom-left-radius: 0.25rem;
    }

    .msg-time {
      font-size: 0.7rem;
      color: var(--zinc-400);
    }

    .msg-wrapper.user .msg-time { text-align: right; }

    /* loading dots */
    .loading-bubble {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.875rem 1.125rem;
      background: var(--zinc-100);
      border-radius: 1.25rem;
      border-bottom-left-radius: 0.25rem;
    }

    .dot {
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 50%;
      background: var(--zinc-400);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Widgets / product carousel ─────────────── */
    .widgets-container {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-top: 0.875rem;
    }

    .widget-block { display: flex; flex-direction: column; gap: 0.5rem; }

    .widget-title {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--zinc-900);
      padding-left: 0.25rem;
    }

    /* ── Embla carousel ─────────────────────────── */
    .embla {
      overflow: hidden;
      padding: 0.375rem 0.25rem 0.5rem;
    }

    .embla__container {
      display: flex;
      gap: 0.25rem;
    }

    .embla__slide {
      flex: 0 0 150px;
      min-width: 0;
    }

    .product-card {
      width: 150px;
      border-radius: 0.75rem;
      overflow: hidden;
      background: var(--white);
      transition: box-shadow 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      text-decoration: none;
    }

    .product-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .product-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--zinc-100);
      display: block;
    }

    .product-card-info {
      padding: 0.5rem 0.625rem 0.625rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .product-name {      
      font-size: .75rem;
      line-height: 1.25rem;
      height: 2.5rem;
      font-weight: 500;
      color: var(--zinc-900);
      margin: 0;

      display: -webkit-box;
      -webkit-box-orient: vertical;  
      overflow: hidden;
    }

    .product-price {
      font-size: 0.8125rem;
      font-weight: 700;
      color: var(--zinc-900);
      margin-top: auto;
      padding-top: 0.25rem;
    }

    /* ── Input area ─────────────────────────────── */
    .muse-input-area {
      padding: 1rem 1.25rem;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 0.625rem;
      background: var(--white);
      align-items: center;
    }

    .input-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    #chatInput {
      width: 100%;
      padding: 0.7rem 4rem 0.7rem 1.125rem;
      border: 1px solid var(--zinc-200);
      border-radius: 9999px;
      outline: none;
      font-size: 0.9375rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #chatInput:focus {
      border-color: var(--zinc-900);
      box-shadow: 0 0 0 2px rgba(24,24,27,0.1);
    }

    #chatInput:disabled { background: #f9fafb; cursor: not-allowed; }

    #charCount {
      position: absolute;
      right: 1.125rem;
      font-size: 0.68rem;
      color: var(--zinc-400);
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    #charCount.warning { color: #ef4444; font-weight: 600; }

    .icon-btn {
      width: 2.375rem;
      height: 2.375rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #sendBtn {
      background: var(--zinc-900);
      color: var(--white);
    }

    #sendBtn:hover:not(:disabled) { background: var(--black); }
    #sendBtn:active:not(:disabled) { transform: scale(0.95); }
    #sendBtn:disabled { background: var(--zinc-200); cursor: not-allowed; }

    #micBtn {
      background: var(--zinc-100);
      color: var(--zinc-600);
      border: 1px solid var(--zinc-200);
    }

    #micBtn:hover:not(:disabled) { background: var(--zinc-200); color: var(--zinc-900); }
    #micBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #micBtn.active {
      background: #fee2e2;
      color: #dc2626;
      border-color: #fca5a5;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
      50%       { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
    }

    /* ── Live mic button ───────────────────────── */
    #liveMicBtn {
      background: var(--zinc-100);
      color: var(--zinc-600);
      border: 1px solid var(--zinc-200);
      position: relative;
    }

    #liveMicBtn:hover:not(:disabled) { background: var(--zinc-200); color: var(--zinc-900); }
    #liveMicBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #liveMicBtn.active {
      background: #dcfce7;
      color: #16a34a;
      border-color: #86efac;
      animation: livePulse 1.2s ease-in-out infinite;
    }

    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0.3); }
      50%       { box-shadow: 0 0 0 6px rgba(22,163,74,0); }
    }

    /* tooltip shown on hover */
    #liveMicBtn::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 0.5rem);
      left: 50%;
      transform: translateX(-50%);
      background: var(--zinc-900);
      color: var(--white);
      font-size: 0.72rem;
      white-space: nowrap;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    #liveMicBtn:hover::after { opacity: 1; }

    @media (max-width: 480px) {
      #musePanel { width: 100vw; }
      #messagesList { padding: 1rem 1rem 2rem; }
      .muse-input-area { padding: 0.75rem 0.875rem; }
      .muse-subtitle { display: none; }
    }
  </style>
</head>
<body>

  <!-- ── Config overlay ───────────────────────────── -->
  <div id="configOverlay">
    <div class="config-box">
      <h2>Shopping Muse</h2>
      <div class="config-field">
        <label for="apiKeyInput">DY API Key</label>
        <input type="text" id="apiKeyInput" placeholder="Enter your dy-api-key…"
               spellcheck="false" autocomplete="off" />
      </div>
      <div class="config-field">
        <label for="langSelect">Preferred language</label>
        <select id="langSelect" style="width:100%;padding:0.625rem 1rem;border:1px solid #e4e4e7;border-radius:0.5rem;font-size:0.9rem;font-family:inherit;outline:none;">
          <option value="en-US" data-label="English US">English US</option>
          <option value="en-GB" data-label="English UK">English UK</option>
          <option value="en-EU" data-label="English EU">English EU</option>
          <option value="es-CL" data-label="Spanish CL">Spanish CL</option>
          <option value="pt-BR" data-label="Portuguese BR">Portuguese BR</option>
        </select>
      </div>
      <p class="config-note">
        The key is sent as a request header directly to
        <code>direct.dy-api.com</code> and is never stored beyond this session.
        Your DY account must have the <strong>Shopping Muse</strong> campaign
        configured with the selector name <code>Shopping Muse</code>.
      </p>
      <button class="config-start-btn" onclick="startMuse()">Start Chat</button>
    </div>
  </div>

  <!-- ── Main panel ───────────────────────────────── -->
  <div id="musePanel">
    <!-- Header -->
    <div class="muse-header">
      <div class="muse-header-top">
        <div class="muse-logo">
          <!-- BotMessageSquare icon -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8V4H8"/>
            <rect width="16" height="12" x="4" y="8" rx="2"/>
            <path d="M2 14h2"/><path d="M20 14h2"/>
            <path d="M15 13v2"/><path d="M9 13v2"/>
          </svg>
          <h1 class="muse-title">Personal Shopper</h1>
        </div>
        <span class="muse-subtitle">Your AI shopping assistant</span>
        <div class="muse-header-actions">
          <button class="muse-ghost-btn" onclick="handleReset()" title="Reset chat">
            <!-- RotateCcw -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            Reset
          </button>
        </div>
      </div>
    </div>

    <!-- Chat -->
    <div class="muse-chat">
      <div id="messagesList"></div>
      <form class="muse-input-area" onsubmit="handleSubmit(event)">
        <div class="input-wrap">
          <input id="chatInput" type="text" placeholder="Ask me anything…"
                 maxlength="150" autocomplete="off" />
          <span id="charCount">0/150</span>
        </div>
        <!-- Mic -->
        <button type="button" class="icon-btn" id="micBtn"
                title="Voice input" onclick="toggleMic()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </button>
        <!-- Live mic -->
        <button type="button" class="icon-btn" id="liveMicBtn"
                data-tip="Live language: English US" onclick="toggleLiveMic()">
          <!-- AudioLines icon -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 10v3"/>
            <path d="M6 6v11"/>
            <path d="M10 3v18"/>
            <path d="M14 8v7"/>
            <path d="M18 5v13"/>
            <path d="M22 10v3"/>
          </svg>
        </button>
        <!-- Send -->
        <button type="submit" class="icon-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m22 2-7 20-4-9-9-4Z"/>
            <path d="M22 2 11 13"/>
          </svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // CONFIG  — edit these if needed
    // ═══════════════════════════════════════════════════
    const DY_MUSE_URL     = 'https://direct.dy-api.com/v2/serve/user/agent-assistant';
    const MUSE_SELECTOR   = 'Shopping Muse';        // DY campaign selector name
    const PRODUCT_IMG_BASE = 'https://se-demo-retail.use1.dev.pub.dydy.io';
    const MSG_MAX_LEN     = 150;

    const STRINGS = {
      INITIAL  : "I'm here to help you find the perfect products. Just tell me what you need!",
      FALLBACK : "I'm sorry, I couldn't find a specific answer for that. How else can I help you?",
      ERROR    : "I'm having a bit of trouble connecting right now. Please try again in a moment.",
      LIVE_PREFIX: 'Ask follow-ups before results. Confirm gender. Keep chat moving. Be brief on responses.',
    };

    // ═══════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════
    let DY_API_KEY     = '';
    let selectedLang   = 'en-US';
    let selectedLangLabel = 'English US';
    let isLoading      = false;
    let micRecognition = null;
    let isMicActive    = false;
    let liveMicRecognition = null;
    let isLiveMicActive    = false;
    let isFirstLiveUtterance = true;
    let isSpeaking         = false;

    // ═══════════════════════════════════════════════════
    // STORAGE HELPERS
    // ═══════════════════════════════════════════════════
    function getStored(name) {
      const local = localStorage.getItem(name);
      if (local !== null) return local;
      const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return m ? decodeURIComponent(m[2]) : null;
    }

    function setStored(name, value, days = 365) {
      try { localStorage.setItem(name, String(value)); } catch (_) {}
      const exp = days
        ? `; expires=${new Date(Date.now() + days * 864e5).toUTCString()}`
        : '';
      document.cookie = `${name}=${encodeURIComponent(value ?? '')}${exp}; path=/; SameSite=Lax`;
    }

    function removeStored(name) {
      localStorage.removeItem(name);
      document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
    }

    // ═══════════════════════════════════════════════════
    // DEVICE / BROWSER
    // ═══════════════════════════════════════════════════
    function deviceType(ua) {
      if (/SmartTV|AppleTV|HbbTV|Roku/i.test(ua)) return 'ODMB';
      if (/iPad|PlayBook|Kindle|Silk/i.test(ua) || (/Android/i.test(ua) && !/Mobi/i.test(ua))) return 'tablet';
      if (/Mobi|iPhone|Android|Windows Phone/i.test(ua)) return 'smartphone';
      return 'desktop';
    }

    function browserName(ua) {
      if (ua.includes('Firefox'))       return 'Firefox';
      if (ua.includes('SamsungBrowser')) return 'Samsung Browser';
      if (ua.includes('OPR') || ua.includes('Opera')) return 'Opera';
      if (ua.includes('Edg'))            return 'Edge';
      if (ua.includes('Chrome'))         return 'Chrome';
      if (ua.includes('Safari'))         return 'Safari';
      return 'Unknown';
    }

    async function publicIp() {
      try {
        const r = await fetch('https://api.ipify.org/?format=json');
        return (await r.json()).ip;
      } catch { return ''; }
    }

    // ═══════════════════════════════════════════════════
    // BUILD REQUEST BODY
    // ═══════════════════════════════════════════════════
    async function buildBody(query) {
      const ua      = navigator.userAgent;
      const dyid    = getStored('_dyid');
      const dyidSrv = getStored('_dyid_server');
      const session = getStored('_dyjsession');
      const chatId  = getStored('_dyMuseChatId');
      const ip      = await publicIp();

      const body = {
        user: { active_consent_accepted: true },
        context: {
          page: {
            locale: 'en_US',
            type: 'OTHER',
            data: [''],
            location: window.location.href,
          },
          device: {
            userAgent: ua,
            type: deviceType(ua),
            browser: browserName(ua),
            ip,
            dateTime: new Date().toISOString(),
          },
          channel: 'WEB',
        },
        session: { dy: session || '' },
        options: {
          returnAnalyticsMetadata: false,
          isImplicitClientData: false,
          isImplicitKeywordSearchEvent: false,
        },
        query: { text: query },
        selector: { name: MUSE_SELECTOR },
      };

      if (dyid)    body.user.dyid        = dyid;
      if (dyidSrv) body.user.dyid_server = dyidSrv;
      if (chatId && chatId !== '') body.query.chatId = chatId;

      return body;
    }

    // ═══════════════════════════════════════════════════
    // DY API CALL
    // ═══════════════════════════════════════════════════
    async function callMuse(query) {
      const body = await buildBody(query);

      const res = await fetch(DY_MUSE_URL, {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'Content-Type': 'application/json',
          'dy-api-key': DY_API_KEY,
        },
        body: JSON.stringify(body),
      });

      if (!res.ok) throw new Error(`DY API ${res.status}`);
      const data = await res.json();

      // Persist DY identity cookies
      (data.cookies || []).forEach(c => {
        if (c.name === '_dyid_server') c.name = '_dyid';
        setStored(c.name, c.value, c.maxAge);
      });

      // Persist chatId for session continuity
      const museData = data?.choices?.[0]?.variations?.[0]?.payload?.data;
      if (museData?.chatId && museData.chatId !== getStored('_dyMuseChatId')) {
        setStored('_dyMuseChatId', museData.chatId);
      }

      const widgets = (museData?.widgets || []).map(w => ({
        title: w.title,
        slots: (w.slots || []).map(s => ({ ...s.productData, sku: s.sku })),
      }));

      return {
        answer: museData?.assistant || null,
        widgets,
      };
    }

    // ═══════════════════════════════════════════════════
    // RENDER HELPERS
    // ═══════════════════════════════════════════════════
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function resolveImg(src) {
      if (!src) return '';
      return src.startsWith('/') ? `${PRODUCT_IMG_BASE}${src}` : src;
    }

    function formatPrice(p) {
      if (p == null) return '';
      const n = Number(p);
      return isNaN(n) ? '' : `$${n.toFixed(2)}`;
    }

    function buildProductCard(p) {
      const img   = resolveImg(p.image || p.imageUrl || p.image_url || '');
      const name  = p.name || p.productName || p.product_name || '';
      const price = formatPrice(p.price);
      const url   = p.url || '#';

      return `<a class="product-card" href="${esc(url)}" target="_blank" rel="noopener">
        ${img ? `<img src="${esc(img)}" alt="${esc(name)}" loading="lazy" />` : ''}
        <div class="product-card-info">
          <p class="product-name" title="${esc(name)}">${esc(name)}</p>
          ${price ? `<p class="product-price">${price}</p>` : ''}
        </div>
      </a>`;
    }

    function buildWidgets(widgets) {
      if (!widgets?.length) return '';
      return `<div class="widgets-container">
        ${widgets.map(w => `
          <div class="widget-block">
            ${w.title ? `<p class="widget-title">${esc(w.title)}</p>` : ''}
            <div class="embla">
              <div class="embla__container">${w.slots.map(s => `<div class="embla__slide">${buildProductCard(s)}</div>`).join('')}</div>
            </div>
          </div>
        `).join('')}
      </div>`;
    }

    const BOT_AVATAR = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>`;
    const USER_AVATAR = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

    function appendMessage(type, text, widgets = []) {
      const list = document.getElementById('messagesList');
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      const isUser = type === 'user';

      const el = document.createElement('div');
      el.className = `msg-wrapper ${isUser ? 'user' : 'bot'}`;
      el.innerHTML = `
        <div class="msg-avatar">${isUser ? USER_AVATAR : BOT_AVATAR}</div>
        <div class="msg-body">
          <p class="msg-bubble">${esc(text)}</p>
          ${!isUser ? buildWidgets(widgets) : ''}
          <span class="msg-time">${time}</span>
        </div>`;

      list.appendChild(el);
      el.querySelectorAll('.embla').forEach(viewport => {
        EmblaCarousel(viewport, { align: 'start', containScroll: 'trimSnaps', dragFree: true });
      });
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showLoading() {
      const list = document.getElementById('messagesList');
      const el = document.createElement('div');
      el.id = 'loadingMsg';
      el.className = 'msg-wrapper bot';
      el.innerHTML = `
        <div class="msg-avatar">${BOT_AVATAR}</div>
        <div class="msg-body">
          <div class="loading-bubble">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </div>`;
      list.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function hideLoading() {
      document.getElementById('loadingMsg')?.remove();
    }

    function setUIBusy(busy) {
      isLoading = busy;
      document.getElementById('chatInput').disabled = busy;
      document.getElementById('micBtn').disabled = busy;
      document.getElementById('liveMicBtn').disabled = busy;
      syncSendBtn();
    }

    function syncSendBtn() {
      const val = document.getElementById('chatInput').value;
      document.getElementById('sendBtn').disabled = !val.trim() || isLoading;
    }

    // ═══════════════════════════════════════════════════
    // SEND MESSAGE
    // ═══════════════════════════════════════════════════
    async function sendMessage(text, displayText) {
      const display = displayText || text;

      if (!text.trim()) {
        appendMessage('bot', STRINGS.INITIAL);
        return;
      }

      appendMessage('user', display);
      setUIBusy(true);
      showLoading();

      try {
        const { answer, widgets } = await callMuse(text);
        hideLoading();
        const botText = answer || STRINGS.FALLBACK;
        appendMessage('bot', botText, widgets);
        if (isLiveMicActive) speakBotMessage(botText);
      } catch (err) {
        console.error('Muse error:', err);
        hideLoading();
        appendMessage('bot', STRINGS.ERROR);
      } finally {
        setUIBusy(false);
        document.getElementById('chatInput').focus();
      }
    }

    function handleSubmit(e) {
      e.preventDefault();
      const inp = document.getElementById('chatInput');
      const text = inp.value.trim();
      if (!text || isLoading) return;
      inp.value = '';
      updateCharCount('');
      sendMessage(text);
    }

    function handleReset() {
      document.getElementById('messagesList').innerHTML = '';
      removeStored('_dyMuseChatId');
      sendMessage('');
    }

    function updateCharCount(val) {
      const el = document.getElementById('charCount');
      el.textContent = `${val.length}/${MSG_MAX_LEN}`;
      el.classList.toggle('warning', val.length >= 140);
      syncSendBtn();
    }

    // ═══════════════════════════════════════════════════
    // VOICE PREFERENCES  (ported from voiceConstants.js)
    // ═══════════════════════════════════════════════════
    const VOICE_PREFERENCES = {
      'en-US': ['Google US English'],
      'en-GB': ['Google UK English Female'],
      'en-EU': ['Google UK English Female'],
      'es-CL': ['Google español'],
      'pt-BR': ['Google português do Brasil'],
    };

    function resolveVoice(lang) {
      const voices = window.speechSynthesis.getVoices();
      const preferred = VOICE_PREFERENCES[lang] || [];
      for (const name of preferred) {
        const match = voices.find(v => v.name.toLowerCase().includes(name.toLowerCase()));
        if (match) return match;
      }
      const langBase = lang.split('-')[0].toLowerCase();
      return voices.find(v => v.lang.toLowerCase().startsWith(langBase)) ?? null;
    }

    // ═══════════════════════════════════════════════════
    // TTS — speak bot reply during live mode
    // ═══════════════════════════════════════════════════
    function speakBotMessage(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      isSpeaking = true;

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = selectedLang;
      utterance.onend  = () => { isSpeaking = false; };
      utterance.onerror = () => { isSpeaking = false; };

      const assignVoiceAndSpeak = () => {
        const voice = resolveVoice(selectedLang);
        if (voice) utterance.voice = voice;
        window.speechSynthesis.speak(utterance);
      };

      const voices = window.speechSynthesis.getVoices();
      if (voices.length) {
        assignVoiceAndSpeak();
      } else {
        window.speechSynthesis.onvoiceschanged = () => {
          window.speechSynthesis.onvoiceschanged = null;
          assignVoiceAndSpeak();
        };
      }
    }

    // ═══════════════════════════════════════════════════
    // LIVE MIC  (continuous — sends each result to Muse)
    // ═══════════════════════════════════════════════════
    function stopLiveMic() {
      liveMicRecognition?.stop();
      liveMicRecognition = null;
      isLiveMicActive = false;
      isFirstLiveUtterance = true;
      const btn = document.getElementById('liveMicBtn');
      btn.classList.remove('active');
      btn.setAttribute('data-tip', 'Live conversation');
    }

    function startLiveMic() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Speech recognition is not supported in this browser.'); return; }

      const recognition = new SR();
      recognition.lang = selectedLang;
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      liveMicRecognition = recognition;

      recognition.onstart = () => {
        isLiveMicActive = true;
        const btn = document.getElementById('liveMicBtn');
        btn.classList.add('active');
        btn.setAttribute('data-tip', 'Live — click to stop');
      };

      recognition.onerror = (e) => {
        if (e.error === 'no-speech') return; // browser restarts naturally via onend
        stopLiveMic();
      };

      recognition.onend = () => {
        // auto-restart while live mic is still supposed to be active
        if (liveMicRecognition) recognition.start();
      };

      recognition.onresult = (e) => {
        const transcript = e.results[e.results.length - 1][0].transcript.trim();
        if (!transcript) return;
        // interrupt any ongoing speech before sending
        if (isSpeaking) window.speechSynthesis.cancel();
        const augmented = isFirstLiveUtterance
          ? `${STRINGS.LIVE_PREFIX} ${transcript}`
          : transcript;
        isFirstLiveUtterance = false;
        sendMessage(augmented, transcript);
      };

      recognition.start();
    }

    function toggleLiveMic() {
      if (isLiveMicActive) { stopLiveMic(); return; }
      // stop basic mic if running
      if (isMicActive) { micRecognition?.stop(); }
      startLiveMic();
    }

    // ═══════════════════════════════════════════════════
    // MIC
    // ═══════════════════════════════════════════════════
    function toggleMic() {
      if (isMicActive) { micRecognition?.stop(); return; }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Speech recognition is not supported in this browser.'); return; }

      micRecognition = new SR();
      micRecognition.lang = selectedLang;
      micRecognition.interimResults = false;

      micRecognition.onstart = () => {
        isMicActive = true;
        document.getElementById('micBtn').classList.add('active');
      };
      micRecognition.onend = () => {
        isMicActive = false;
        document.getElementById('micBtn').classList.remove('active');
        micRecognition = null;
      };
      micRecognition.onerror = () => micRecognition?.stop();
      micRecognition.onresult = (e) => {
        const t = e.results[e.results.length - 1][0].transcript.trim();
        const inp = document.getElementById('chatInput');
        inp.value = inp.value ? `${inp.value} ${t}` : t;
        updateCharCount(inp.value);
        inp.focus();
      };

      micRecognition.start();
    }

    // ═══════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════
    document.getElementById('chatInput').addEventListener('input', e => updateCharCount(e.target.value));

    // Allow pressing Enter in the config form
    document.getElementById('apiKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') startMuse();
    });

    function startMuse() {
      const key = document.getElementById('apiKeyInput').value.trim();
      if (!key) {
        document.getElementById('apiKeyInput').focus();
        return;
      }
      DY_API_KEY = key;
      const sel = document.getElementById('langSelect');
      selectedLang = sel.value;
      selectedLangLabel = sel.options[sel.selectedIndex].dataset.label || sel.value;
      // update live mic tooltip to reflect chosen language
      document.getElementById('liveMicBtn').setAttribute('data-tip', `Live language: ${selectedLangLabel}`);
      document.getElementById('configOverlay').style.display = 'none';
      const panel = document.getElementById('musePanel');
      panel.style.display = 'flex';
      sendMessage('');
    }
  </script>
</body>
</html>
